<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studiekompassen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <img src="kompass.png" alt="Studiekompassen Logo" class="logo">
        <h1>Studiekompassen</h1>
        <button id="pomodoroNavBtn">timer</button>
        <button id="aichat" class="AIChat">AI_Chat</button>
    </nav>

    <div class="app-container">
        <!-- Left sidebar with mini calendar -->
        <div class="sidebar">
            <div class="mini-calendar-wrapper">
                <div class="mini-calendar-header">
                    <button id="miniPrevMonth" class="mini-nav">&lt;</button>
                    <h3 id="miniMonthYear">January 2026</h3>
                    <button id="miniNextMonth" class="mini-nav">&gt;</button>
                </div>
                <table class="mini-calendar-table">
                    <thead>
                        <tr>
                            <th>M</th>
                            <th>T</th>
                            <th>O</th>
                            <th>T</th>
                            <th>F</th>
                            <th>L</th>
                            <th>S</th>
                        </tr>
                    </thead>
                    <tbody id="miniCalendarBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Main content area -->
        <div class="main-content">
            <div class="week-header">
                <div class="week-nav">
                    <button id="prevWeek" class="week-btn">&lt;</button>
                    <h2 id="weekDisplay">Vecka 1, Jan - Jan 2026</h2>
                    <button id="nextWeek" class="week-btn">&gt;</button>
                    <button id="toggleSidebar" class="week-btn">Visa/dölj kalender</button>
                </div>
            </div>

            <!-- Days header table (now inside scroll area to align with columns) -->
            <div class="schedule-wrapper">
                <div class="scroll-area">
                    <table id="daysTable" class="days-table">
                        <thead>
                            <tr>
                                <th class="day-header" data-day="0">
                                    <div class="day-name">mån</div>
                                    <div class="day-num">23</div>
                                </th>
                                <th class="day-header" data-day="1">
                                    <div class="day-name">tis</div>
                                    <div class="day-num">24</div>
                                </th>
                                <th class="day-header" data-day="2">
                                    <div class="day-name">ons</div>
                                    <div class="day-num">25</div>
                                </th>
                                <th class="day-header" data-day="3">
                                    <div class="day-name">tors</div>
                                    <div class="day-num">26</div>
                                </th>
                                <th class="day-header" data-day="4">
                                    <div class="day-name">fre</div>
                                    <div class="day-num">27</div>
                                </th>
                                <th class="day-header" data-day="5">
                                    <div class="day-name">lör</div>
                                    <div class="day-num">28</div>
                                </th>
                                <th class="day-header" data-day="6">
                                    <div class="day-name">sön</div>
                                    <div class="day-num">29</div>
                                </th>
                            </tr>
                        </thead>
                    </table>

                    <div class="schedule-body">
                        <div class="time-column" id="timeColumn">
                            <!-- time labels generated by JS -->
                        </div>
                        <div id="daysContainer" class="days-container">
                            <!-- JS will create one table per day here -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="schedule-buttons">
                <button id="saveButton">Spara Schema</button>
                <button id="loadButton">Ladda Schema</button>
                <button id="scheduleresetbutton">Återställ schema</button>
            </div>
        </div>
    </div>

    <!-- cell edit modal -->
    <div id="cellModal" class="modal hidden">
        <div class="modal-content">
            <h3>Redigera lektion</h3>
            <label>Ämne: <input type="text" id="modalSubj"></label><br>
            <input type="hidden" id="modalColor" value="#ffffff">
            <!-- preset palette with five colors -->
            <div id="colorPalette">
                <span class="palette-color" data-color="#ff9999" style="background:#ff9999;"></span>
                <span class="palette-color" data-color="#99ff99" style="background:#99ff99;"></span>
                <span class="palette-color" data-color="#9999ff" style="background:#9999ff;"></span>
                <span class="palette-color" data-color="#ffff99" style="background:#ffff99;"></span>
                <span class="palette-color" data-color="#ff99ff" style="background:#ff99ff;"></span>
            </div>
            <button id="modalnextweek">lägg till samma sak på flera dagar</button>
            <button id="modalSave">Spara</button>
            <button id="modalDelete">Radera</button>
            <button id="modalCancel">Avbryt</button>
        </div>
    </div>

    <!-- Pomodoro modal (hidden by default) -->
    <div id="pomodoroModal" class="modal hidden">
        <div class="modal-content">
            <span id="modalClose" class="modal-close">&times;</span>
            <section id="pomodoro">
                <h2>Pomodoro Timer</h2>
                <!-- custom duration controls -->
                <div id="settings">
                    <label>
                        Arbetsminuter:
                        <input type="number" id="workDuration" min="1" value="25"> min
                    </label>
                    <label>
                        Pausminuter:
                        <input type="number" id="breakDuration" min="1" value="5"> min
                    </label>
                </div>
                <div id="timer">25:00</div>
                <button id="startPauseBtn" class="pomo-btn">Start</button>
                <button id="resetBtn" class="pomo-btn">Reset</button>
                <!-- skip button (id matches JS) -->
                <button id="skipButton" class="pomo-btn">Hoppa över paus</button>
            </section>
        </div>
    </div>
 
    <!--Chat bot popup-->
    <div id="chatbotModal" class="modal hidden">
    <div class="modal-content">
      <span id="chatbotClose" class="modal-close">&times;</span>
  
      <section id="chatbot">
        <h2>AI Chat</h2>
  
        <div class="chatbox">
            <div class="chat-messages">
                <div class="msg bot">Hej. Hur kan jag hjälpa dig?</div>
            </div>
        
            <div class="chatbotruta">
                <button id="Frågor" class="knapp1">Hur använder man Pomodoro?</button>
                <button id="Frågor" class="knapp2">Hur använder man Kalendern?</button>
            </div>
        </div>
      </section>
    </div>
  </div>

    <script src="script.js"></script>
    <hej src="hej.cs"></hej>
</body>
</html>
