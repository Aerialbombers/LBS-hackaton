<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI hjälp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button id="pomodoroNavBtn">Pomodoro</button>
    </nav>

    <div class="schedule-container">
        <h1>Schema</h1>
        <p>Här är ditt schema för veckan:</p>
        <!-- structured table so user can input subjects -->
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>dagar</th>
                    <th>Måndag</th>
                    <th>Tisdag</th>
                    <th>Onsdag</th>
                    <th>Torsdag</th>
                    <th>Fredag</th>
                </tr>
            </thead>
            <tbody>
                <!-- six default periods -->
                <tr>
                    <td>1</td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text"class="subj"></td>
                    <td><input type="text" class="subj"></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text"class="subj"></td>
                    <td><input type="text" class="subj"></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text"class="subj"></td>
                    <td><input type="text" class="subj"></td>
                </tr>
                <tr>
                    <td>4</td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text"class="subj"></td>
                    <td><input type="text" class="subj"></td>
                </tr>
                <tr>
                    <td>5</td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text"class="subj"></td>
                    <td><input type="text" class="subj"></td>
                </tr>
                <tr>
                    <td>6</td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text" class="subj"></td>
                    <td><input type="text"class="subj"></td>
                    <td><input type="text" class="subj"></td>
                </tr>
            </tbody>
        </table>
        <button id="saveButton">Spara Schema</button>
        <button id="loadButton">Ladda Schema</button>
        <button id="addRowButton">Lägg till ämnen</button>
        <!-- area that shows the saved schedule -->
        <div id="scheduleDisplay" class="schedule-display"></div>
    </div>

    <!-- Pomodoro modal (hidden by default) -->
    <div id="pomodoroModal" class="modal hidden">
        <div class="modal-content">
            <span id="modalClose" class="modal-close">&times;</span>
            <section id="pomodoro">
                <h2>Pomodoro Timer</h2>
                <!-- custom duration controls -->
                <div id="settings">
                    <label>
                        Arbetsminuter:
                        <input type="number" id="workDuration" min="1" value="25"> min
                    </label>
                    <label>
                        Pausminuter:
                        <input type="number" id="breakDuration" min="1" value="5"> min
                    </label>
                </div>
                <div id="timer">25:00</div>
                <button id="startPauseBtn" class="pomo-btn">Start</button>
                <button id="resetBtn" class="pomo-btn">Reset</button>
                <!-- skip button (id matches JS) -->
                <button id="skipButton" class="pomo-btn">Hoppa över paus</button>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
